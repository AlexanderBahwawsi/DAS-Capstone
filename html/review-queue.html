<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCR — Review Queue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">KCR</div>
        <div>
          <h2>KCR Manager</h2>
          <small>Submission Portal</small>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!--Links will be filled in here by apps.js-->
      </nav>
      <div class="sidebar-footer">
        <div class="avatar" id="userAvatar">U</div>
        <div class="user-info">
          <div class="name" id="userName">Loading...</div>
          <div class="role" id="userRole">Loading...</div>
        </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="top-bar">
        <div style="display:flex;align-items:center;gap:1rem;">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
          <span class="page-title">Review Queue</span>
        </div>
        <div class="top-bar-actions">
          <div class="notification-bell">
            <button class="btn-icon">&#128276;</button>
            <span class="badge-count">5</span>
          </div>
          <button onclick="signOut()" class="btn btn-secondary btn-sm">Sign Out</button>
        </div>
      </header>

      <div class="page-content">
        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue">&#128220;</div>
            <div>
              <div class="stat-value" id="stat-assigned">0</div>
              <div class="stat-label">Assigned to You</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon yellow">&#9203;</div>
            <div>
              <div class="stat-value" id="stat-awaiting">0</div>
              <div class="stat-label">Awaiting Review</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">&#10004;</div>
            <div>
              <div class="stat-value" id="stat-reviewed">0</div>
              <div class="stat-label">Reviewed</div>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab active" onclick="switchReviewTab(this,'awaiting')">Awaiting Review (0)</button>
          <button class="tab" onclick="switchReviewTab(this,'reviewed')">Reviewed (0)</button>
          <button class="tab" onclick="switchReviewTab(this,'all')">All Assigned (0)</button>
        </div>

        <!-- Filters -->
        <div class="filters-bar">
          <div class="search-input">
            <span class="search-icon">&#128269;</span>
            <input type="text" placeholder="Search submissions...">
          </div>
          <select class="filter-select" id="filter-genre">
            <option>All Genres</option>
            <option>Poetry</option>
            <option>Short Fiction</option>
            <option>Creative Non-Fiction</option>
            <option>Visual Art</option>
          </select>
          <select class="filter-select">
            <option>Sort: Date Assigned</option>
            <option>Due Date</option>
            <option>Genre</option>
          </select>
        </div>

        <!-- Anonymized Submission Cards -->
        <p class="text-small text-muted" style="margin-bottom:1rem;">
          &#128274; Author identities are hidden until you complete your review to ensure an unbiased evaluation.
        </p>

        <div id="review-cards" style="display:grid;gap:1rem;">
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/reviews.js"></script>
</body>
</html>
