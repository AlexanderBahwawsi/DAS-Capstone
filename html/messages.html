<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCR — Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .msg-layout { display: flex; gap: 0; height: calc(100vh - var(--header-height) - 4rem); min-height: 500px; }
    .msg-threads { width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); border-radius: var(--radius-lg) 0 0 var(--radius-lg); overflow: hidden; }
    .msg-threads-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
    .msg-threads-list { flex: 1; overflow-y: auto; }
    .thread-item { display: flex; gap: .75rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background var(--transition); }
    .thread-item:hover, .thread-item.active { background: var(--primary-light); }
    .thread-item .thread-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: .8rem; flex-shrink: 0; }
    .thread-item .thread-info { flex: 1; min-width: 0; }
    .thread-item .thread-title { font-weight: 600; font-size: .85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-item .thread-preview { font-size: .78rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-item .thread-meta { display: flex; justify-content: space-between; align-items: center; margin-top: .2rem; }
    .thread-item .thread-time { font-size: .7rem; color: var(--text-light); }
    .thread-item .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }

    .msg-conversation { flex: 1; display: flex; flex-direction: column; background: var(--surface); border-radius: 0 var(--radius-lg) var(--radius-lg) 0; overflow: hidden; }
    .msg-conv-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .msg-conv-body { flex: 1; padding: 1.5rem; overflow-y: auto; }
    .msg-conv-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: .75rem; }
    .msg-conv-footer input { flex: 1; padding: .65rem .9rem; border: 1px solid var(--border); border-radius: var(--radius); font-family: inherit; font-size: .875rem; }
    .msg-conv-footer input:focus { outline: none; border-color: var(--primary); }

    .chat-msg { display: flex; gap: .75rem; margin-bottom: 1.25rem; }
    .chat-msg.own { flex-direction: row-reverse; }
    .chat-msg .chat-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: .75rem; flex-shrink: 0; }
    .chat-msg .chat-bubble { max-width: 70%; padding: .75rem 1rem; border-radius: var(--radius-lg); font-size: .875rem; line-height: 1.5; }
    .chat-msg:not(.own) .chat-bubble { background: var(--surface-alt); }
    .chat-msg.own .chat-bubble { background: var(--primary); color: #fff; }
    .chat-msg .chat-time { font-size: .7rem; color: var(--text-light); margin-top: .3rem; }
    .chat-msg.own .chat-time { text-align: right; }

    @media (max-width: 768px) {
      .msg-threads { width: 100%; border-radius: var(--radius-lg); }
      .msg-conversation { display: none; }
      .msg-layout { flex-direction: column; height: auto; }
    }
  </style>
</head>
<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="logo">KCR</div>
        <div>
          <h2>KCR Manager</h2>
          <small>Submission Portal</small>
        </div>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!--Links will be filled in here by apps.js-->
      </nav>
      <div class="sidebar-footer">
        <div class="avatar" id="userAvatar">U</div>
        <div class="user-info">
          <div class="name" id="userName">Loading...</div>
          <div class="role" id="userRole">Loading...</div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <header class="top-bar">
        <div style="display:flex;align-items:center;gap:1rem;">
          <button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">&#9776;</button>
          <span class="page-title">Messages</span>
        </div>
        <div class="top-bar-actions">
          <button onclick="signOut()" class="btn btn-secondary btn-sm">Sign Out</button>
        </div>
      </header>

      <div class="page-content">
        <div class="msg-layout" style="border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);">
          <!-- Thread List -->
          <div class="msg-threads">
            <div class="msg-threads-header">
              <div class="search-input" style="min-width:auto;">
                <span class="search-icon">&#128269;</span>
                <input type="text" placeholder="Search messages..." style="width:100%;">
              </div>
            </div>
            <div class="msg-threads-list" id="threads-list">
            </div>
          </div>

          <!-- Conversation View -->
          <div class="msg-conversation">
            <div class="msg-conv-header">
              <div>
                <strong style="font-size:.9rem;">#KCR-0039 — The Glass Garden</strong>
                <div class="text-small text-muted">Discussion between editors &amp; reviewers</div>
              </div>
              <a href="submission-detail.html" class="btn btn-secondary btn-sm">View Submission</a>
            </div>

            <div class="msg-conv-body" id="conv-body">
            </div>

            <div class="msg-conv-footer">
              <input type="text" placeholder="Type your message...">
              <button class="btn btn-primary">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="../js/messages.js"></script>
</body>
</html>
