<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KCR Submission Manager — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <div class="auth-page">
    <!-- Left Hero Panel -->
    <div class="auth-hero">
      <div style="margin-bottom:2rem;">
        <div style="width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:700;margin:0 auto .75rem;">
          KCR
        </div>
      </div>
      <h1>KCR Submission Manager</h1>
      <p>The centralized platform for managing literary magazine submissions, reviews, and publication decisions.</p>
    </div>

    <!-- Right Form Panel -->
    <div class="auth-form-container">
      <div class="auth-form">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account to continue</p>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label class="form-label" style="display:flex;justify-content:space-between;">
              Password
              <a href="#" style="font-weight:500;font-size:.8rem;">Forgot password?</a>
            </label>
            <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
          </div>

          <div class="form-group" style="display:flex;align-items:center;gap:.5rem;">
            <input type="checkbox" id="remember">
            <label for="remember" style="font-size:.85rem;cursor:pointer;">Remember me</label>
          </div>

          <div id="errorMessage" style="display:none; color:#dc2626; margin-bottom:1rem; font-size:0.875rem; padding:0.5rem; background:#fee2e2; border-radius:6px;"></div>

          <button type="submit" id = "submitBtn" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">
            Sign In
          </button>

          <!-- Role-based demo links
          <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);">
            <p class="text-small text-muted" style="text-align:center;margin-bottom:.75rem;">Quick demo access:</p>
            <div style="display:flex;gap:.5rem;justify-content:center;">
              <a href="dashboard.html" class="btn btn-secondary btn-sm">Submitter</a>
              <a href="dashboard.html" class="btn btn-secondary btn-sm">Reviewer</a>
              <a href="admin.html" class="btn btn-secondary btn-sm">Admin</a>
            </div>
          </div> -->
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
    (function(){
      var form = document.getElementById('loginForm');
      var emailInput = document.getElementById('email');
      var passwordInput = document.getElementById('password');
      var errorDiv = document.getElementById('errorMessage');
      var submitBtn = document.getElementById('submitBtn');

      if (!form){
        console.error('Form not found!');
        return;
      }

      form.onsubmit = async function(event){
        event.preventDefault();
        console.log('Form submitted!');
        var email = emailInput.value;
        var password = passwordInput.value;

        if(!email || !password){
          errorDiv.style.display = 'block';
          errorDiv.textContent = 'Please enter both email and password';
          return;
        }
        errorDiv.style.display = 'none';

        var originalText = submitBtn.textContent;
        submitBtn.textContent = 'Signing in...';
        submitBtn.disabled = true;

        try{
          var response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              email: email,
              password: password
            })
          });

          var data = await response.json();

          if(response.ok){
            window.setToken(data.token);
            window.setUser(data.user);
            window.location.href = 'dashboard.html';
            } else{
              errorDiv.style.display = 'block';
              errorDiv.textContent = data.error || 'Login failed';
              submitBtn.textContent = originalText;
              submitBtn.disabled = false;
            }
          } catch(error){
            console.error('Error:', error);
            errorDiv.style.display = 'block';
            errorDiv.textContent = 'Network error';
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
          }
        };
      })();
  </script>
</body>
</html>
